name: Build and Push Multi-Arch Image
on: [push]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Install Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.19'  # Specify the Go version you want to use

      - name: Set up Go modules
        run: |
          cd ~
          mkdir test
          cd test
          go mod init test

      - name: Install Swagger
        run: |
          go get github.com/go-swagger/go-swagger/cmd/swagger@v0.30.0
          go install github.com/go-swagger/go-swagger/cmd/swagger@v0.30.0

      - name: Find Swagger and Skupper Path
        run: |
          # The find command will be looking inside the home directory (~), which should cover the global paths
          swagger_path=$(find /root/ -name swagger 2>/dev/null)
          skupper_path=$(find /root/ -name skupper 2>/dev/null)
          echo "Swagger path: $swagger_path"
          echo "Skupper path: $skupper_path"

      - name: Copy Swagger to Skupper Directory
        run: |
          # Ensure we are copying the swagger binary to the correct Skupper path
          cp -r $swagger_path /root/skupper/
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Quay
        run: |
          echo "${{ secrets.QUAY_TOKEN }}" | docker login quay.io -u "${{ secrets.QUAY_USER }}" --password-stdin

      - name: Build and Push Multi-Arch Image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/s390x \
            -t quay.io/rhn-support-rjauhari/skupper-tests:latest \
            --push -f Dockerfile.ci-test . && 

           docker buildx build \
            --platform linux/amd64,linux/arm64,linux/s390x \
            -t quay.io/rhn-support-rjauhari/hey:latest \
            --push -f test/images/Containerfile.hey . &&

           docker buildx build \
            --platform linux/amd64,linux/arm64,linux/s390x \
            -t quay.io/rhn-support-rjauhari/iperf3:latest \
            --push -f test/images/Containerfile.iperf3 . && 

           docker buildx build \
            --platform linux/amd64,linux/arm64,linux/s390x \
            -t quay.io/rhn-support-rjauhari/nghttp2:latest \
            --push -f test/images/test/images/Containerfile.nghttp2 . &&  

           docker buildx build \
            --platform linux/amd64,linux/arm64,linux/s390x \
            -t quay.io/rhn-support-rjauhari/wrk:latest \
            --push -f test/images/test/images/Containerfile.wrk . 

